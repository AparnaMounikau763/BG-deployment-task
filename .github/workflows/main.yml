name: Blue Green Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/bluegreen:${{ github.sha }} .
          docker tag \
            ${{ secrets.DOCKER_USERNAME }}/bluegreen:${{ github.sha }} \
            ${{ secrets.DOCKER_USERNAME }}/bluegreen:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/bluegreen:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/bluegreen:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            echo "===== Installing Docker ====="

            if ! command -v docker >/dev/null 2>&1; then
              sudo apt update
              sudo apt install docker.io -y
            fi

            sudo systemctl enable docker
            sudo systemctl start docker

            echo "===== Installing Nginx ====="

            if ! command -v nginx >/dev/null 2>&1; then
              sudo apt update
              sudo apt install nginx -y
            fi

            sudo systemctl enable nginx
            sudo systemctl start nginx

            echo "===== Detecting Active Environment ====="

            if grep -q "5001" /etc/nginx/sites-enabled/default 2>/dev/null
            then
              ACTIVE=blue
              TARGET=green
              ACTIVE_PORT=5001
              TARGET_PORT=5002
            else
              ACTIVE=green
              TARGET=blue
              ACTIVE_PORT=5002
              TARGET_PORT=5001
            fi

            echo "Current : $ACTIVE"
            echo "Target  : $TARGET"

            echo "===== Pull Latest Image ====="

            docker pull ${{ secrets.DOCKER_USERNAME }}/bluegreen:${{ github.sha }}

            docker stop ${TARGET}-app || true
            docker rm ${TARGET}-app || true

            echo "===== Starting Container ====="

            docker run -d \
              --name ${TARGET}-app \
              --restart always \
              -e VERSION=${TARGET} \
              -p ${TARGET_PORT}:5000 \
              ${{ secrets.DOCKER_USERNAME }}/bluegreen:${{ github.sha }}

            echo "===== Waiting for Health ====="

            HEALTHY=false

            for i in {1..30}
            do
              if curl --silent --fail http://localhost:${TARGET_PORT}/health >/dev/null
              then
                HEALTHY=true
                break
              fi

              echo "Retry $i/30"

              sleep 5
            done

            if [ "$HEALTHY" != "true" ]
            then
              echo "Application failed"

              docker logs ${TARGET}-app || true

              docker stop ${TARGET}-app || true
              docker rm ${TARGET}-app || true

              exit 1
            fi

            echo "===== Switching Traffic ====="

            printf "server {\n\
                listen 80;\n\
                location / {\n\
                    proxy_pass http://localhost:${TARGET_PORT};\n\
                    proxy_set_header Host \$host;\n\
                    proxy_set_header X-Real-IP \$remote_addr;\n\
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;\n\
                    proxy_set_header X-Forwarded-Proto \$scheme;\n\
                }\n\
            }\n" | sudo tee /etc/nginx/sites-enabled/default >/dev/null

            sudo nginx -t

            sudo systemctl reload nginx

            echo "Traffic switched to ${TARGET}"

            echo "===== Monitoring ====="

            sleep 60
                        echo "===== Final Health Check ====="

            if curl --silent --fail http://localhost:${TARGET_PORT}/health >/dev/null
            then

              echo "Deployment Healthy"

              if docker ps -a --format "{{.Names}}" | grep -q "^${ACTIVE}-app$"
              then
                docker stop ${ACTIVE}-app
                docker rm ${ACTIVE}-app
              fi

              docker image prune -f || true

              echo "===================================="
              echo "Deployment Successful"
              echo "Live Environment : ${TARGET}"
              echo "===================================="

            else

              echo "===================================="
              echo "Deployment Failed"
              echo "Starting Automatic Rollback..."
              echo "===================================="

              printf "server {\n\
                  listen 80;\n\
                  location / {\n\
                      proxy_pass http://localhost:${ACTIVE_PORT};\n\
                      proxy_set_header Host \$host;\n\
                      proxy_set_header X-Real-IP \$remote_addr;\n\
                      proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;\n\
                      proxy_set_header X-Forwarded-Proto \$scheme;\n\
                  }\n\
              }\n" | sudo tee /etc/nginx/sites-enabled/default >/dev/null

              sudo nginx -t
              sudo systemctl reload nginx

              docker stop ${TARGET}-app || true
              docker rm ${TARGET}-app || true

              echo "Rollback Completed"

              exit 1

            fi
