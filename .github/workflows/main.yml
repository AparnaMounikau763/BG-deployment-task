name: Blue Green Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/bluegreen:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/bluegreen:${{ github.sha }} \
            ${{ secrets.DOCKER_USERNAME }}/bluegreen:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/bluegreen:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/bluegreen:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            # Install Docker
            if ! command -v docker >/dev/null 2>&1
            then
              sudo apt-get update
              sudo apt-get install -y docker.io
            fi

            sudo systemctl enable docker
            sudo systemctl start docker

            # Install Nginx
            if ! command -v nginx >/dev/null 2>&1
            then
              sudo apt-get update
              sudo apt-get install -y nginx
            fi

            sudo systemctl enable nginx
            sudo systemctl start nginx

            # Determine target environment
            if docker ps --format "{{.Names}}" | grep -q "^blue-app$"
            then
              TARGET=green
              OLD=blue
              PORT=5002
            else
              TARGET=blue
              OLD=green
              PORT=5001
            fi

            echo "Deploying to ${TARGET}"

            docker pull ${{ secrets.DOCKER_USERNAME }}/bluegreen:latest

            docker stop ${TARGET}-app || true
            docker rm ${TARGET}-app || true

            docker run -d \
              --name ${TARGET}-app \
              -p ${PORT}:5000 \
              -e VERSION=${TARGET} \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/bluegreen:latest

            sleep 15

            curl --fail http://localhost:${PORT}/health

            # Update Nginx
            sudo tee /etc/nginx/sites-enabled/default > /dev/null <<EOF
            server {
                listen 80;

                location / {
                    proxy_pass http://localhost:${PORT};

                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }
            EOF

            sudo nginx -t
            sudo systemctl reload nginx

            docker stop ${OLD}-app || true
            docker rm ${OLD}-app || true

            echo "======================================="
            echo "Deployment Successful"
            echo "Active Environment : ${TARGET}"
            echo "Serving Port       : ${PORT}"
            echo "======================================="