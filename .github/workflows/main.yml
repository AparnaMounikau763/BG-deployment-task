name: Blue Green Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/bluegreen:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/bluegreen:${{ github.sha }} \
            ${{ secrets.DOCKER_USERNAME }}/bluegreen:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/bluegreen:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/bluegreen:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            set -e

            echo "===== Installing Docker if required ====="

            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y docker.io
            fi

            sudo systemctl enable docker
            sudo systemctl start docker

            echo "===== Installing Nginx if required ====="

            if ! command -v nginx >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y nginx
            fi

            sudo systemctl enable nginx
            sudo systemctl start nginx

            echo "===== Detecting Active Environment ====="

            if [ ! -f /etc/nginx/sites-enabled/default ]; then
              ACTIVE=green
              TARGET=blue
              ACTIVE_PORT=5002
              TARGET_PORT=5001
            else
              CURRENT_PORT=$(grep -oP 'proxy_pass http://localhost:\K[0-9]+' \
                /etc/nginx/sites-enabled/default 2>/dev/null || echo "5001")

              if [ "$CURRENT_PORT" = "5001" ]; then
                ACTIVE=blue
                TARGET=green
                ACTIVE_PORT=5001
                TARGET_PORT=5002
              else
                ACTIVE=green
                TARGET=blue
                ACTIVE_PORT=5002
                TARGET_PORT=5001
              fi
            fi

            echo "Current Environment : $ACTIVE"
            echo "Target Environment  : $TARGET"

            echo "===== Pulling Latest Image ====="

            docker pull ${{ secrets.DOCKER_USERNAME }}/bluegreen:${{ github.sha }}

            docker stop ${TARGET}-app || true
            docker rm ${TARGET}-app || true

            echo "===== Starting Target Container ====="

            docker run -d \
              --name ${TARGET}-app \
              -p ${TARGET_PORT}:5000 \
              -e VERSION=${TARGET} \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/bluegreen:${{ github.sha }}

            echo "===== Waiting for Application ====="

            HEALTHY=false

            for i in {1..30}; do
              if curl --silent --fail http://localhost:${TARGET_PORT}/health >/dev/null; then
                HEALTHY=true
                break
              fi

              echo "Waiting... ($i/30)"
              sleep 5
            done

            if [ "$HEALTHY" != "true" ]; then
              echo "Application failed to start."

              docker logs ${TARGET}-app || true

              docker stop ${TARGET}-app || true
              docker rm ${TARGET}-app || true

              exit 1
            fi

            echo "===== Switching Traffic ====="

            sudo tee /etc/nginx/sites-enabled/default >/dev/null <<EOF
            server {
                listen 80;

                location / {
                    proxy_pass http://localhost:${TARGET_PORT};

                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                }
            }
            EOF

            sudo nginx -t
            sudo systemctl reload nginx

            echo "Traffic switched to $TARGET"

            echo "===== Monitoring Deployment ====="

            sleep 60

            if curl --silent --fail http://localhost:${TARGET_PORT}/health >/dev/null; then

              echo "Deployment Healthy"

              docker stop ${ACTIVE}-app || true
              docker rm ${ACTIVE}-app || true

              docker image prune -f || true

              echo "=================================="
              echo "Deployment Successful"
              echo "Live Environment : $TARGET"
              echo "=================================="

            else

              echo "Deployment Failed"
              echo "Rolling Back..."

              sudo tee /etc/nginx/sites-enabled/default >/dev/null <<EOF
              server {
                  listen 80;

                  location / {
                      proxy_pass http://localhost:${ACTIVE_PORT};

                      proxy_set_header Host \$host;
                      proxy_set_header X-Real-IP \$remote_addr;
                      proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                      proxy_set_header X-Forwarded-Proto \$scheme;
                  }
              }
              EOF

              sudo nginx -t
              sudo systemctl reload nginx

              docker stop ${TARGET}-app || true
              docker rm ${TARGET}-app || true

              echo "Rollback Successful"

              exit 1

            fi