name: Blue Green Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/bluegreen:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/bluegreen:${{ github.sha }} \
                     ${{ secrets.DOCKER_USERNAME }}/bluegreen:latest

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/bluegreen:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/bluegreen:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |

            # Determine active environment
            if docker ps --format "{{.Names}}" | grep -q blue-app
            then
                TARGET=green
                PORT=5002
            else
                TARGET=blue
                PORT=5001
            fi

            echo "Deploying to $TARGET"

            docker stop ${TARGET}-app || true
            docker rm ${TARGET}-app || true

            docker pull ${{ secrets.DOCKER_USERNAME }}/bluegreen:latest

            docker run -d \
              --name ${TARGET}-app \
              -p ${PORT}:5000 \
              -e VERSION=${TARGET} \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/bluegreen:latest

            sleep 15

            curl http://localhost:${PORT}/health

            if [ $? -ne 0 ]
            then
                echo "Health Check Failed"
                docker stop ${TARGET}-app
                docker rm ${TARGET}-app
                exit 1
            fi

            if [ "$TARGET" = "blue" ]
            then
                sudo cp /home/ubuntu/nginx/blue.conf \
                        /etc/nginx/sites-enabled/default
            else
                sudo cp /home/ubuntu/nginx/green.conf \
                        /etc/nginx/sites-enabled/default
            fi

            sudo nginx -t
            sudo systemctl reload nginx

            echo "Deployment Successful"